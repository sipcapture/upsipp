# UPSIPP — SIP endpoint monitor inspired by Upptime

name: SIP Check CI
on:
  schedule:
    - cron: "0 * * * *"
  repository_dispatch:
    types: [uptime]
  workflow_dispatch:
concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.ref_name }}-upsipp
  cancel-in-progress: false
permissions:
  contents: write
  issues: write
jobs:
  release:
    name: Check SIP endpoints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install gossipper
        run: ./scripts/install-gossipper.sh

      - name: Check SIP endpoints
        run: ./scripts/check.sh update
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
