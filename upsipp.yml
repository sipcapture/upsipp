# UPSIPP template configuration — edit after creating your repo from this template.
# Setup CI auto-fills owner/repo and applies workflowSchedule to GitHub Actions.
owner: YOUR_GITHUB_USERNAME
repo: YOUR_REPO_NAME

gossipper:
  version: "0.1.64"

# Delay between endpoint checks in milliseconds (optional).
# delay: 1000

# Global issue assignees (optional). Per-endpoint assignees override for that endpoint.
# assignees:
#   - your-github-username

# GitHub Actions cron schedules (applied to workflows by Setup CI).
# GitHub minimum interval is 5 minutes (*/5 * * * *). Default: hourly.
workflowSchedule:
  uptime: "0 * * * *"       # SIP Check CI — every hour
  # uptime: "*/5 * * * *"   # every 5 minutes (fastest GitHub allows)
  graphs: "0 0 * * *"       # Graphs CI — daily at 00:00 UTC
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"

endpoints:
  # ---------------------------------------------------------------------------
  # ACTIVE EXAMPLE — OPTIONS health check (default, lightweight)
  # Replace remote with your SIP target. Remove or disable when adding real ones.
  # ---------------------------------------------------------------------------
  - name: Example Trunk — OPTIONS
    slug: example-options
    enabled: true
    remote: sip.example.com:5060
    transport: u1              # u1 UDP | t1 TCP | l1/cl TLS
    scenario: options          # built-in alias → scenarios/options_client.xml
    service: options           # SIP Request-URI user part
    timeout_global: 15

  # ---------------------------------------------------------------------------
  # BUILTIN UAC — single INVITE call (enable + set remote)
  # ---------------------------------------------------------------------------
  - name: Example Trunk — INVITE (builtin UAC)
    slug: example-invite
    enabled: false
    remote: sip.example.com:5060
    transport: u1
    scenario: uac              # gossipper -sn uac
    timeout_global: 30
    service: upsipp

  # ---------------------------------------------------------------------------
  # CUSTOM XML — SIPp-compatible scenario file
  # ---------------------------------------------------------------------------
  - name: Example Trunk — custom XML scenario
    slug: example-custom-xml
    enabled: false
    remote: sip.example.com:5060
    transport: u1
    scenario: scenarios/example_uac.xml
    timeout_global: 30
    service: upsipp

  # ---------------------------------------------------------------------------
  # DIGEST AUTH — store credentials in GitHub Secrets (Settings → Secrets)
  # ---------------------------------------------------------------------------
  - name: Example Trunk — authenticated OPTIONS
    slug: example-auth
    enabled: false
    remote: sip.example.com:5060
    transport: u1
    scenario: options
    service: options
    timeout_global: 15
    auth:
      user_secret: SIP_USER     # GitHub secret name (without $)
      pass_secret: SIP_PASS

  # ---------------------------------------------------------------------------
  # TLS — signaling over TLS (lab: tls_skip_verify; production: use proper CA)
  # ---------------------------------------------------------------------------
  - name: Example Trunk — TLS OPTIONS
    slug: example-tls
    enabled: false
    remote: sip.example.com:5061
    transport: l1                # l1 or cl (TLS client)
    scenario: options
    service: options
    timeout_global: 15
    tls_skip_verify: true

  # ---------------------------------------------------------------------------
  # HEALTH THRESHOLDS — gossipper CI gates (exit code 2 on failure)
  # ---------------------------------------------------------------------------
  - name: Example Trunk — strict health gates
    slug: example-health
    enabled: false
    remote: sip.example.com:5060
    transport: u1
    scenario: options
    timeout_global: 15
    health:
      min_success_ratio: 1.0
      max_failed_calls: 0
      max_timeouts: 0

  # ---------------------------------------------------------------------------
  # PER-ENDPOINT ASSIGNEES — override global assignees for this endpoint
  # ---------------------------------------------------------------------------
  - name: Example Trunk — on-call assignee
    slug: example-oncall
    enabled: false
    remote: sip.example.com:5060
    transport: u1
    scenario: options
    assignees:
      - your-github-username

# Status page (optional): enable GitHub Pages in repo Settings → Pages (gh-pages branch).
status-website:
  baseUrl: /YOUR_REPO_NAME
  name: UPSIPP
  introTitle: "**UPSIPP** monitors SIP endpoints with simulated sessions, powered entirely by GitHub Actions."
  introMessage: |
    Inspired by [Upptime](https://github.com/upptime/upptime). Checks run via
    [gossipper](https://github.com/sipcapture/gossipper) OPTIONS scenarios by default.
    Configure endpoints in [`upsipp.yml`](https://github.com/$OWNER/$REPO/blob/HEAD/upsipp.yml).
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

commitMessages:
  statusChange: "$EMOJI $SITE_NAME is $STATUS ($RESPONSE_CODE in $RESPONSE_TIME ms) [skip ci] [upsipp]"
  readmeContent: ":pencil: Update summary in README [skip ci] [upsipp]"
  graphsUpdate: ":bento: Update graphs [skip ci] [upsipp]"
